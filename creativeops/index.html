<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreativeOps AI — Autonomous Creative Agency</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Space Mono"', 'ui-monospace', 'monospace'],
            display: ['Syne', 'ui-sans-serif', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: #f8fafc; color: #1e293b; font-family: "Space Mono", monospace; }

    .scroll-thin::-webkit-scrollbar              { width: 4px; height: 4px; }
    .scroll-thin::-webkit-scrollbar-track        { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb        { background: #d1d5db; border-radius: 2px; }
    .scroll-thin::-webkit-scrollbar-thumb:hover  { background: #9ca3af; }

    @keyframes fadeSlideUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeSlideLeft { from{opacity:0;transform:translateX(-18px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeSlideRight{ from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
    @keyframes blink         { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulseRing     { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.4);opacity:0} }
    @keyframes spinOnce      { to{transform:rotate(360deg)} }
    @keyframes slideIn       { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

    .anim-left  { animation: fadeSlideLeft  .52s cubic-bezier(.25,.46,.45,.94) forwards; }
    .anim-up    { animation: fadeSlideUp    .52s cubic-bezier(.25,.46,.45,.94) forwards; }
    .anim-right { animation: fadeSlideRight .52s cubic-bezier(.25,.46,.45,.94) forwards; }
    .line-in    { animation: slideIn .15s ease forwards; }
    .cursor-blink { display:inline-block; width:7px; height:13px; background:#fbbf24;
                    animation:blink 1s step-end infinite; vertical-align:text-bottom; margin-left:2px; }
    .pulse-ring::after { content:''; position:absolute; inset:0; border-radius:50%;
                         background:currentColor; animation:pulseRing 1.6s ease-out infinite; }
    .spin { animation:spinOnce .7s linear infinite; }

    /* Fringe mode toggle */
    .fringe-toggle { transition: all 0.3s ease; }
    .fringe-active { border-color: rgba(167,139,250,0.6) !important; background: rgba(167,139,250,0.08) !important; }
    .fringe-glow { box-shadow: 0 0 20px rgba(167,139,250,0.15); }

    /* Agent badges */
    .badge-maya    { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); color: #fbbf24; }
    .badge-james   { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: #4ade80; }
    .badge-priya   { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.4); color: #818cf8; }
    .badge-liam    { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.4); color: #ea580c; }
    .badge-zara    { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.4); color: #ec4899; }
    .badge-system  { background: rgba(161,161,170,0.12); border: 1px solid rgba(161,161,170,0.25); color: #71717a; }

    /* Thinking vs content lines */
    .line-thinking { color: #a78bfa; font-style: italic; }
    .line-search   { color: #fbbf24; }
    .line-done     { color: #4ade80; font-weight: bold; }
    .line-error    { color: #f87171; }
    .line-default  { color: #71717a; }

    /* Markdown */
    .md h1 { font-family:Syne,sans-serif; font-size:1.35rem; font-weight:800; color:#0f172a; margin:1.1rem 0 .45rem; }
    .md h2 { font-family:Syne,sans-serif; font-size:1rem; font-weight:700; color:#b45309; margin:1.3rem 0 .35rem; padding-bottom:5px; border-bottom:1px solid #e2e8f0; }
    .md h3 { font-size:.9rem; font-weight:700; color:#365314; margin:.9rem 0 .3rem; }
    .md p  { color:#334155; font-size:.82rem; line-height:1.7; margin:.45rem 0; }
    .md ul,.md ol { color:#334155; font-size:.82rem; margin:.4rem 0 .4rem 1.3rem; }
    /* ── Email send success animations ─────────────────────── */
    @keyframes sentPop {
      0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.25) rotate(6deg);  opacity: 1; }
      75%  { transform: scale(0.92) rotate(-3deg); }
      100% { transform: scale(1)    rotate(0deg);  }
    }
    @keyframes successSlideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    @keyframes sentPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(34,197,94,.0); }
      50%      { box-shadow: 0 0 0 10px rgba(34,197,94,.15); }
    }
    .success-banner { animation: successSlideIn .42s cubic-bezier(.34,1.56,.64,1) forwards; }
    .sent-check     { display:inline-block; animation: sentPop .55s cubic-bezier(.34,1.56,.64,1) forwards; }
    .sent-glow      { animation: sentPulse 2s ease-in-out infinite; }

    /* Markdown styles */
    .md li { margin:.22rem 0; }
    .md table { width:100%; border-collapse:collapse; margin:.85rem 0; font-size:.78rem; }
    .md th { background:#f3f4f6; color:#b45309; padding:6px 10px; text-align:left; border:1px solid #e5e7eb; font-family:"Space Mono",monospace; font-size:.72rem; }
    .md td { color:#4b5563; padding:5px 10px; border:1px solid #e5e7eb; }
    .md tr:nth-child(even) td { background:#f9fafb; }
    .md strong { color:#111827; }
    .md em { color:#6b7280; font-style:italic; }
    .md code { background:#f1f5f9; color:#ea580c; padding:1px 5px; border-radius:3px; font-family:"Space Mono",monospace; font-size:.8em; }
    .md pre { background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px; padding:10px; overflow-x:auto; margin:.6rem 0; }
    .md pre code { background:none; padding:0; }
    .md hr { border:none; border-top:1px solid #e5e7eb; margin:1.1rem 0; }
    .md blockquote { border-left:3px solid #f59e0b; padding-left:.85rem; color:#4b5563; margin:.5rem 0; }
    .md a { color:#2563eb; text-decoration:underline; }

    /* [Thinking: ...] lines in proposal */
    .md p:has-text, .thinking-inline { color: #8b5cf6; font-style: italic; font-size: .78rem; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

const API_BASE = 'http://localhost:8000';

/* ── Example briefs ─────────────────────────────────── */
const EXAMPLE_BRIEFS_STANDARD = [
  `We are Tartan Audio, an Edinburgh-based independent music label specialising in folk and traditional Scottish music. We need a complete brand refresh and digital marketing campaign to launch our new streaming platform. Our current branding feels dated and doesn't reflect our artist roster or audience. Budget: £15,000. Timeline: 6 weeks.`,
  `We are Glennside Architecture, a boutique Glasgow architecture studio with 8 years of experience in sustainable residential and commercial design. Our website was built in 2019 and no longer reflects our portfolio quality. We need a full website redesign with a premium, minimal aesthetic, SEO uplift, and portfolio CMS. Budget: £9,500. Timeline: 5 weeks.`,
  `We are Highland Bakes, a family-run artisan bakery in Inverness looking to expand our online presence and launch a nationwide delivery service. We need branding refresh, a new e-commerce website, and a 3-month social media campaign. Budget: £12,000. Timeline: 8 weeks.`,
];

const EXAMPLE_BRIEFS_FRINGE = [
  `We are Saltire & Verse, a spoken word poetry collective making our Edinburgh Fringe debut this August at Pleasance Courtyard. 4 shows, 60 seats per show, tickets at £12. We need a full digital marketing campaign to sell out all performances and build a fanbase for future touring. Total budget: £3,500.`,
  `We are The Midnight Cabinet, a dark comedy magic duo performing 6 shows at Gilded Balloon Teviot in August. We've performed at smaller venues but this is our first major Fringe run. Target: 80% sell-through. We need press outreach, social media, flyering strategy, and a killer show poster. Budget: £4,500.`,
  `We are Fracture Theatre, a Glasgow-based physical theatre company premiering our new show "Undone" at Assembly Roxy during the Edinburgh Fringe. 8 performances. We want press coverage, a social media campaign, and help building our mailing list for future tours. Budget: £5,000.`,
];

const PAST_CLIENTS = [
  { name: 'Wavefront Records',  type: 'Brand Campaign',        budget: '£12k', city: 'Edinburgh', emoji: '🎵', hue: 'amber' },
  { name: 'Glasswork Studio',   type: 'Web Redesign',          budget: '£8k',  city: 'Glasgow',   emoji: '🏗️', hue: 'green' },
  { name: 'Fringe Forward',     type: 'Digital Marketing',     budget: '£20k', city: 'Edinburgh', emoji: '🎭', hue: 'sky'   },
  { name: 'Saltire Comedy Co.', type: 'Fringe Campaign',       budget: '£4k',  city: 'Edinburgh', emoji: '🎤', hue: 'purple'},
];

const HUE_BORDER  = { amber:'border-amber-500/35 bg-amber-500/5', green:'border-green-500/35 bg-green-500/5', sky:'border-sky-500/35 bg-sky-500/5', purple:'border-purple-500/35 bg-purple-500/5' };
const HUE_TEXT    = { amber:'text-amber-400', green:'text-green-400', sky:'text-sky-400', purple:'text-purple-400' };

/* ── Helpers ─────────────────────────────────────────── */
function fireConfetti() {
  const colors = ['#fbbf24','#22c55e','#06b6d4','#a855f7','#f43f5e'];
  const end = Date.now() + 2800;
  (function burst() {
    confetti({ particleCount:3, angle:60,  spread:58, origin:{x:0}, colors });
    confetti({ particleCount:3, angle:120, spread:58, origin:{x:1}, colors });
    if (Date.now() < end) requestAnimationFrame(burst);
  }());
}

/* ── Parse a stream line into agent/type metadata ────── */
function parseLine(txt) {
  if (!txt.trim()) return { agent: null, type: 'blank', text: txt };

  // Agent voice lines
  if (txt.includes('[Maya]'))  return { agent: 'maya',  type: txt.includes('🔎') ? 'search' : 'thinking', text: txt.replace(/.*\[Maya\]\s*/,'') };
  if (txt.includes('[James]')) return { agent: 'james', type: 'thinking', text: txt.replace(/.*\[James\]\s*/,'') };
  if (txt.includes('[Priya]')) return { agent: 'priya', type: 'thinking', text: txt.replace(/.*\[Priya\]\s*/,'') };
  if (txt.includes('[Liam]'))  return { agent: 'liam',  type: 'thinking', text: txt.replace(/.*\[Liam\]\s*/,'') };
  if (txt.includes('[Zara]'))  return { agent: 'zara',  type: 'thinking', text: txt.replace(/.*\[Zara\]\s*/,'') };

  // Status lines
  if (txt.includes('✅') || txt.includes('DONE'))  return { agent: null, type: 'done',   text: txt };
  if (txt.includes('❌') || txt.includes('Error')) return { agent: null, type: 'error',  text: txt };
  if (txt.includes('🔎') || txt.includes('Searching')) return { agent: 'maya', type: 'search', text: txt };

  return { agent: null, type: 'default', text: txt };
}

function AgentBadge({ agent }) {
  if (!agent) return null;
  const badges = {
    maya:  { label: 'Maya · Research',  cls: 'badge-maya'  },
    james: { label: 'James · Proposal', cls: 'badge-james' },
    priya: { label: 'Priya · Critique', cls: 'badge-priya' },
    liam:  { label: 'Liam · Contract',  cls: 'badge-liam'  },
    zara:  { label: 'Zara · Pricing',   cls: 'badge-zara'  },
  };
  const b = badges[agent];
  if (!b) return null;
  return (
    <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-mono mr-1.5 shrink-0 ${b.cls}`}>
      {b.label}
    </span>
  );
}

function EmptyState({ icon, label }) {
  return (
    <div className="h-full flex flex-col items-center justify-center gap-3 p-8 text-center bg-gray-50/50 rounded-xl border border-dashed border-gray-200 anim-fade">
      <div className="text-4xl grayscale opacity-40">{icon}</div>
      <div className="text-[11px] font-mono text-gray-400 max-w-[200px] leading-relaxed italic">{label}</div>
    </div>
  );
}

function ActionBtn({ icon, label, onClick, variant='primary', disabled }) {
  const base = "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-mono font-bold transition-all active:scale-[0.97]";
  const styles = {
    primary:   "bg-amber-400 hover:bg-amber-500 text-black shadow-sm",
    secondary: "bg-gray-100 border border-gray-200 text-gray-700 hover:bg-gray-200",
    danger:    "bg-red-50 border border-red-200 text-red-600 hover:bg-red-100"
  };
  return (
    <button onClick={onClick} disabled={disabled} className={`${base} ${styles[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}>
      <span>{icon}</span><span>{label}</span>
    </button>
  );
}

function StatusDot({ status }) {
  const bg = { running:'bg-amber-400', complete:'bg-green-500', error:'bg-red-500' }[status] ?? 'bg-gray-300';
  return (
    <span className="relative inline-flex items-center justify-center w-3 h-3">
      <span className={`relative w-2.5 h-2.5 rounded-full ${bg} pulse-ring`} />
    </span>
  );
}


/* ── Fringe Mode Toggle ──────────────────────────────── */
function FringeModeToggle({ fringeMode, setFringeMode }) {
  return (
    <div className="flex items-center gap-2 mb-3">
      <button
        onClick={() => setFringeMode(false)}
        className={`flex-1 py-2 px-3 rounded-lg border text-[11px] font-mono transition-all ${
          !fringeMode
            ? 'border-amber-500 bg-amber-50 text-amber-700 shadow-sm'
            : 'border-gray-200 text-gray-400 hover:text-gray-500 hover:bg-gray-50/50'
        }`}
      >
        🏢 SME Agency
      </button>
      <button
        onClick={() => setFringeMode(true)}
        className={`flex-1 py-2 px-3 rounded-lg border text-[11px] font-mono transition-all fringe-toggle ${
          fringeMode
            ? 'border-purple-400 bg-purple-50 text-purple-700 shadow-sm'
            : 'border-gray-200 text-gray-400 hover:text-gray-500 hover:bg-gray-50/50'
        }`}
      >
        🎭 Fringe Mode
      </button>
    </div>
  );
}

/* ── Column 1 — Brief Panel ─────────────────────────── */
function BriefPanel({ brief, setBrief, onPrefill, onRun, status, visible, fringeMode, setFringeMode }) {
  const busy = status === 'running';
  return (
    <div className={`flex flex-col gap-3 h-full transition-all duration-500 ${visible ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-4'}`}>

      <div className="flex items-center gap-2.5 pb-3 border-b border-gray-200">
        <StatusDot status={status} />
        <h1 className="font-display text-xl font-extrabold text-gray-900 tracking-tight" style={{fontFamily:'Syne,sans-serif'}}>
          Creative<span className="text-amber-500">Ops</span> AI
        </h1>
        <span className="ml-auto text-[9px] font-mono text-gray-400 border border-gray-200 px-1.5 py-0.5 rounded bg-gray-50/50">v2.0</span>
      </div>

      <p className="text-[11px] text-gray-600 leading-relaxed -mt-1">
        Autonomous back-office for Scottish creative agencies and Fringe acts.<br/>
        Drop a brief. Get a full proposal in 90 seconds.
      </p>

      <FringeModeToggle fringeMode={fringeMode} setFringeMode={setFringeMode} />

      {fringeMode && (
        <div className="flex items-start gap-2 p-2.5 rounded-lg bg-purple-50 border border-purple-200 -mt-1">
          <span className="text-sm">🎭</span>
          <p className="text-[10px] text-purple-700 leading-relaxed">
            Fringe mode active — proposals include press outreach, flyering strategy, and social proof campaigns tailored for Edinburgh festival acts.
          </p>
        </div>
      )}

      <div className="flex flex-col gap-1.5 flex-1">
        <label className="text-[10px] font-mono text-gray-400 uppercase tracking-widest">Client Brief</label>
        <textarea
          value={brief}
          onChange={e => setBrief(e.target.value)}
          disabled={busy}
          placeholder={fringeMode
            ? "Tell us about your Fringe act, venue, show dates, ticket target..."
            : "Drop your client brief here..."
          }
          className={`flex-1 min-h-[140px] bg-white border rounded-lg p-3 text-[13px] text-gray-800 placeholder-gray-400 resize-none focus:outline-none transition-colors font-mono leading-relaxed disabled:opacity-50 shadow-sm ${
            fringeMode
              ? 'border-purple-200 focus:border-purple-400 focus:ring-1 focus:ring-purple-400'
              : 'border-gray-200 focus:border-amber-400 focus:ring-1 focus:ring-amber-400'
          }`}
        />
      </div>

      <div className="flex gap-2">
        <button
          onClick={onPrefill}
          disabled={busy}
          className="flex-1 text-[11px] py-2 px-3 rounded-lg border border-gray-200 text-gray-400 bg-gray-50 hover:bg-white hover:border-amber-400 hover:text-amber-600 transition-all disabled:opacity-30"
        >⚡ Example {fringeMode ? 'Fringe' : ''} Brief</button>
        <button
          onClick={onRun}
          disabled={busy || !brief.trim()}
          className={`flex-[2] py-2.5 px-4 rounded-lg font-bold text-[13px] transition-all disabled:opacity-35 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm ${
            fringeMode
              ? 'bg-purple-600 hover:bg-purple-700 text-white active:scale-[.98]'
              : 'bg-amber-400 hover:bg-amber-500 text-black active:scale-[.98]'
          }`}
        >
          {busy
            ? <><span className="w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full spin"/>Running…</>
            : `▶ Run Agent Pipeline`
          }
        </button>
      </div>

      {/* Agent team intro */}
      <div>
        <div className="flex items-center gap-2 mb-2">
          <span className="text-[10px] font-mono text-gray-400 uppercase tracking-widest">Agent Team</span>
        </div>
        <div className="flex flex-col gap-1.5">
          {[
            { name: 'Maya', role: 'Research', badge: 'badge-maya', desc: 'Market data' },
            { name: 'James', role: 'Proposal', badge: 'badge-james', desc: 'Writes pitch' },
            { name: 'Priya', role: 'Critique', badge: 'badge-priya', desc: 'Quality review' },
            { name: 'Liam', role: 'Contract', badge: 'badge-liam', desc: 'Scope risks' },
            { name: 'Zara', role: 'Pricing', badge: 'badge-zara', desc: 'Margins' },
          ].map(a => (
            <div key={a.name} className="flex items-center gap-2 p-2 rounded-lg border border-gray-100 bg-gray-50">
              <span className={`px-1.5 py-0.5 rounded text-[9px] font-mono ${a.badge}`}>{a.name}</span>
              <span className="text-[10px] text-gray-600">{a.role} agent · {a.desc}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Past clients / memory */}
      <div>
        <div className="flex items-center gap-2 mb-1.5 mt-2">
          <span className="text-[10px] font-mono text-gray-400 uppercase tracking-widest">Agent Memory</span>
          <span className="text-[9px] px-1.5 py-0.5 rounded-full border border-green-200 bg-green-50 text-green-700 font-mono">
            {PAST_CLIENTS.length} clients
          </span>
        </div>
        <div className="flex flex-col gap-1">
          {PAST_CLIENTS.map(c => (
            <div key={c.name} className={`flex items-center gap-2 p-1.5 rounded border ${HUE_BORDER[c.hue].replace('bg-','bg-white border-opacity-50 ')}`}>
              <span className="text-sm">{c.emoji}</span>
              <div className="flex-1 min-w-0">
                <div className={`text-[10px] font-bold truncate ${HUE_TEXT[c.hue].replace('400','600')}`}>{c.name}</div>
                <div className="text-[9px] text-gray-400">{c.type} · {c.budget}</div>
              </div>
              <span className="text-[9px] px-1 py-0.5 rounded border border-gray-200 text-gray-400 font-mono bg-white">RAG</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Thinking stream line ────────────────────────────── */
const ThinkingLine = memo(function ThinkingLine({ txt, animate }) {
  const parsed = parseLine(txt);

  const textColor = {
    thinking: 'text-purple-600',
    search:   'text-amber-600',
    done:     'text-green-600 font-bold',
    error:    'text-red-500',
    blank:    'text-transparent',
    default:  'text-gray-600',
  }[parsed.type] ?? 'text-gray-600';

  return (
    <div className={`flex items-start gap-1 text-[11px] leading-relaxed font-mono ${animate ? 'line-in' : ''}`}>
      {parsed.agent && <AgentBadge agent={parsed.agent} />}
      <span className={`${textColor} flex-1 min-w-0`}>
        {parsed.text || <span className="opacity-0">_</span>}
      </span>
    </div>
  );
});

/* ── Column 2 — Thinking Stream ─────────────────────── */
function ThinkingPanel({ lines, status, visible, fringeMode }) {
  const endRef = useRef(null);
  const prevLen = useRef(0);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, [lines.length]);

  const streaming = status === 'running';

  return (
    <div className={`flex flex-col h-full transition-all duration-500 delay-150 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>

      <div className="flex items-center gap-2 pb-3 mb-2 border-b border-gray-200">
        <div className="flex gap-1.5">
          <span className="w-2.5 h-2.5 rounded-full bg-red-400"/>
          <span className="w-2.5 h-2.5 rounded-full bg-amber-400"/>
          <span className="w-2.5 h-2.5 rounded-full bg-green-400"/>
        </div>
        <span className="text-[11px] font-mono text-gray-400 ml-1">agent-activity — live stream</span>
        {fringeMode && <span className="text-[9px] px-1.5 py-0.5 rounded border border-purple-200 text-purple-600 bg-purple-50 font-mono">🎭 fringe</span>}
        {streaming && (
          <span className="ml-auto flex items-center gap-1 text-[10px] font-mono text-amber-600 font-bold">
            <span className="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"/>LIVE
          </span>
        )}

function fileIcon(name) {
  if (name.endsWith('/'))     return '📁';
  if (name.endsWith('.pdf'))  return '📄';
  if (name.endsWith('.md'))   return '📝';
  if (name.endsWith('.docx')) return '📃';
  if (name.endsWith('.xlsx')) return '📊';
  if (name.endsWith('.pptx')) return '📑';
  if (name.endsWith('.zip'))  return '🗜️';
  if (name.endsWith('.png') || name.endsWith('.jpg')) return '🖼️';
  return '📄';
}

function FolderNode({ name, files=[], open, onToggle, onFileClick }) {
  return (
    <div>
      <button onClick={onToggle} className="flex items-center gap-1.5 w-full text-left py-1 px-1.5 rounded hover:bg-gray-100/50 transition-colors group">
        <span className="text-[10px] text-gray-400 w-2.5 font-bold">{open ? '▾' : '▸'}</span>
        <span className="text-sm">{open ? '📂' : '📁'}</span>
        <span className="text-[11px] font-mono text-gray-500 font-bold group-hover:text-amber-600">{name}/</span>
      </button>
      {open && (
        <div className="ml-5 pl-2 border-l border-gray-200">
          {files.map(f => (
            <div key={f} onClick={() => onFileClick && onFileClick(f)} className="flex items-center gap-1.5 py-0.5 px-2 mt-0.5 rounded text-[11px] font-mono text-gray-400 hover:text-amber-600 hover:bg-amber-50 cursor-pointer transition-colors">
              <span>{fileIcon(f)}</span><span>{f}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function FoldersTab({ structure, openModal }) {

function CalendarTab({ events, projectName }) {
  const [icsLoading, setIcsLoading] = useState(false);
  const [icsMsg, setIcsMsg]         = useState('');

  if (!events||!events.length) return <EmptyState icon="📅" label="Calendar will be generated after pipeline runs" />;
  const byWeek = events.reduce((acc, ev) => { const w=ev.week_number??1; (acc[w]=acc[w]||[]).push(ev); return acc; }, {});

  const handleDownloadIcs = async () => {
    setIcsLoading(true);
    try {
      const res = await fetch(`${API_BASE}/calendar/ics`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ events, project_name: projectName || 'Creative Project' }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${(projectName || 'project').toLowerCase().replace(/\s+/g,'_')}_schedule.ics`;
      link.click();
      URL.revokeObjectURL(link.href);
      setIcsMsg('ICS downloaded!');
    } catch (e) {
      setIcsMsg("Error: " + e.message);
    } finally {
      setIcsLoading(false);
      setTimeout(() => setIcsMsg(''), 3000);
    }
  };

  return (
    <div className="h-full flex flex-col min-h-0">
      <div className="flex items-center gap-2 mb-3 shrink-0">
        <ActionBtn
          onClick={handleDownloadIcs}
          loading={icsLoading}
          icon="📅"
          label="Download .ics"
          variant="secondary"
        />
        {icsMsg && <span className="text-[10px] font-mono text-green-600">{icsMsg}</span>}
      </div>

      <div className="flex-1 overflow-y-auto scroll-thin space-y-5 pr-1">
        {Object.entries(byWeek).map(([week, wkEvs]) => (
          <div key={week}>
            <div className="flex items-center gap-2 mb-2">
              <span className="text-[10px] font-mono font-bold text-gray-400 uppercase tracking-widest shrink-0">Week {week}</span>
              <span className="flex-1 h-px bg-gray-200"/>
            </div>
            <div className="space-y-2">
              {wkEvs.map((ev, i) => (
                <div key={i} className={`flex items-start gap-2 p-3 rounded-lg border bg-white shadow-sm ${ev.type === 'call' ? 'border-amber-200' : 'border-gray-200'}`}>
                  <span className="text-base leading-none mt-px">{ev.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-[12px] text-gray-700 leading-tight">{ev.title}</div>
                    <div className="text-[10px] text-gray-400 font-mono mt-0.5">{ev.date} · {ev.time} · {ev.duration_minutes}min</div>
                    {ev.attendees?.length>0 && <div className="text-[10px] text-gray-400 mt-1 truncate">With: {ev.attendees.join(', ')}</div>}
                  </div>
                  <div className="flex flex-col items-end gap-1.5 shrink-0">
                    <span className="text-[9px] font-mono text-gray-400 whitespace-nowrap">{ev.location}</span>
                    {ev.google_cal_link && (
                      <a
                        href={ev.google_cal_link}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="text-[9px] font-mono px-2 py-0.5 rounded bg-blue-50 border border-blue-200 text-blue-600 hover:bg-blue-100 transition-colors whitespace-nowrap"
                        title="Add to Google Calendar"
                      >
                        📅 Add to Calendar
                      </a>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   EMAIL TAB — live Gmail send with dramatic success state
═══════════════════════════════════════════════════════════════ */

function EmailTab({ email, smtpConfigured }) {
  const [sending,    setSending]    = useState(false);
  const [sendResult, setSendResult] = useState(null);   // null | {ok, to, msg}
  const [editTo,     setEditTo]     = useState('');
  const [showEdit,   setShowEdit]   = useState(false);

  // Sync editable recipient when email preview arrives
  useEffect(() => {
    if (email?.to) setEditTo(email.to);
  }, [email?.to]);

  if (!email) return <EmptyState icon="✉️" label="Email draft will be generated after pipeline runs" />;

  const sent = sendResult?.ok === true;

  const handleSend = async () => {
    setSending(true);
    setSendResult(null);
    try {
      const res = await fetch(`${API_BASE}/send-email`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to:      editTo || email.to,
          subject: email.subject,
          body:    email.body,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
      setSendResult({ ok: true, msg: data.message || 'Email sent!', to: editTo || email.to });
    } catch (e) {
      setSendResult({ ok: false, msg: e.message });
    } finally {
      setSending(false);
    }
  };

  const handleMailto = () => {
    const s = encodeURIComponent(email.subject);
    const b = encodeURIComponent(email.body.slice(0, 1800));
    window.open(`mailto:${editTo || email.to}?subject=${s}&body=${b}`, '_blank');
  };

  return (
    <div className="h-full flex flex-col gap-2.5">

      {/* ── Email headers ─────────────────────────────────── */}
      <div className="bg-white/90 rounded-lg border border-gray-200 p-3 space-y-2 shrink-0">
        {/* Editable To: field */}
        <div className="flex gap-2 text-[11px] font-mono items-center">
          <span className="text-gray-400 w-14 shrink-0">To:</span>
          {showEdit ? (
            <input
              value={editTo}
              onChange={e => setEditTo(e.target.value)}
              onBlur={() => setShowEdit(false)}
              autoFocus
              className="flex-1 bg-white border border-amber-500/40 rounded px-2 py-0.5 text-gray-900 text-[11px] font-mono focus:outline-none"
            />
          ) : (
            <span
              className="text-gray-900 break-all cursor-pointer hover:text-amber-400 transition-colors group"
              onClick={() => !sent && setShowEdit(true)}
              title={sent ? 'Sent' : 'Click to edit recipient'}
            >
              {editTo || email.to}
              {!sent && <span className="ml-1 opacity-40 group-hover:opacity-80">✏️</span>}
            </span>
          )}
        </div>

        <div className="flex gap-2 text-[11px] font-mono">
          <span className="text-gray-400 w-14 shrink-0">Subject:</span>
          <span className="text-gray-900 break-all">{email.subject}</span>
        </div>

        {email.attachments?.length > 0 && (
          <div className="flex gap-2 text-[11px] font-mono flex-wrap">
            <span className="text-gray-400 w-14 shrink-0">Attach:</span>
            <div className="flex gap-1.5 flex-wrap">
              {email.attachments.map(a => (
                <span key={a} className="px-1.5 py-0.5 rounded bg-gray-100 border border-gray-200 text-gray-700 text-[10px]">📎 {a}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Email body ────────────────────────────────────── */}
      <div className={`flex-1 overflow-y-auto scroll-thin rounded-lg border p-3 min-h-0 transition-all duration-500 ${
        sent ? 'bg-green-950/20 border-green-900/40 opacity-50' : 'bg-gray-50/50 border-gray-200'
      }`}>
        <pre className="text-[11px] font-mono text-gray-700 whitespace-pre-wrap leading-relaxed">{email.body}</pre>
      </div>

      {/* ── SUCCESS BANNER ── appears with pop animation on send ── */}
      {sent && (
        <div className="success-banner sent-glow flex flex-col items-center justify-center gap-3 py-4 px-3 rounded-xl bg-green-500/10 border border-green-500/35">
          <span className="sent-check text-5xl leading-none select-none">✅</span>
          <div className="text-center space-y-0.5">
            <div className="text-[14px] font-bold text-green-400 tracking-tight">
              Email sent to client — awaiting response
            </div>
            <div className="text-[10px] font-mono text-gray-500">{sendResult.to}</div>
          </div>
          <div className="flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"/>
            <span className="text-[10px] font-mono text-green-600">Delivered via Gmail SMTP</span>
          </div>
        </div>
      )}

      {/* ── ERROR BANNER ───────────────────────────────────── */}
      {sendResult && !sendResult.ok && (
        <div className="flex items-start gap-2.5 p-3 rounded-lg bg-red-500/8 border border-red-500/30">
          <span className="text-xl">❌</span>
          <div>
            <div className="text-[12px] font-bold text-red-400">Send failed</div>
            <div className="text-[10px] font-mono text-red-400/70 mt-0.5 break-all">{sendResult.msg}</div>
            {!smtpConfigured && (
              <div className="text-[10px] font-mono text-gray-400 mt-1">
                Tip: set SMTP_HOST / SMTP_USER / SMTP_PASSWORD in .env
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Footer ─────────────────────────────────────────── */}
      <div className="flex items-center gap-2 shrink-0 flex-wrap">
        {/* Status badge — flips to green on success */}
        <span className={`text-[9px] font-mono px-2 py-1 rounded border font-bold transition-all duration-500 ${
          sent
            ? 'bg-green-500/10 border-green-500/30 text-green-400'
            : 'bg-amber-500/8  border-amber-500/25 text-amber-500'
        }`}>
          {sent ? '✓ SENT' : email.status}
        </span>

        <div className="ml-auto flex items-center gap-2">
          {/* Mailto fallback */}
          <ActionBtn
            onClick={handleMailto}
            icon="↗"
            label="Open in Mail"
            variant="secondary"
          />

          {/* Primary send button — morphs to a green "Sent!" chip after success */}
          {sent ? (
            <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-green-500/15 border border-green-500/40 text-green-400 text-[11px] font-mono font-bold">
              <span>✓</span><span>Sent!</span>
            </div>
          ) : (
            <button
              onClick={handleSend}
              disabled={sending || !smtpConfigured}
              className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-[12px] font-bold font-mono transition-all active:scale-[.97] ${
                !smtpConfigured
                  ? 'bg-gray-100 border border-gray-300 text-gray-400 cursor-not-allowed opacity-50'
                  : sending
                  ? 'bg-amber-500/30 border border-amber-500/40 text-amber-300 cursor-wait'
                  : 'bg-amber-500 hover:bg-amber-400 text-black shadow-lg shadow-amber-500/20'
              }`}
            >
              {sending
                ? <><span className="w-3.5 h-3.5 border-2 border-amber-300 border-t-transparent rounded-full spin"/>Sending…</>
                : <><span>✉️</span> Send to Client</>
              }
            </button>
          )}
        </div>
      </div>

      {/* SMTP setup hint — only when not configured */}
      {!smtpConfigured && !sent && (
        <p className="text-[9px] font-mono text-gray-400 text-right -mt-1">
          Add SMTP_HOST / SMTP_USER / SMTP_PASSWORD to .env to enable live sending
        </p>
      )}
    </div>
  );
}

            {t==='Folders'  && <FoldersTab  structure={mockOutputs?.folders} openModal={mockOutputs?.openModal}/>}
            {t==='Calendar' && <CalendarTab events={mockOutputs?.calendar} projectName={mockOutputs?.meta?.project_name}/>}
            {t==='Email'    && <EmailTab    email={mockOutputs?.email} smtpConfigured={mockOutputs?.meta?.smtp_configured} />}
            {t==='Contract' && <ContractTab data={mockOutputs?.contract_output}/>}
            {t==='Pricing'  && <PricingTab  data={mockOutputs?.pricing_output}/>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── File Modal ──────────────────────────────────────── */
function FileModal({ fileName, onClose }) {
  if (!fileName) return null;
  return (
    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
      <div className="bg-white border border-gray-200 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col anim-up">
        <div className="flex justify-between items-center p-4 border-b border-gray-200 bg-white/10">
           <div className="flex items-center gap-2">
              <span className="text-xl">{fileIcon(fileName)}</span>
              <span className="text-[14px] font-bold font-mono text-gray-900">{fileName}</span>
           </div>
           <button onClick={onClose} className="text-gray-500 hover:text-gray-900 text-2xl font-light">&times;</button>
        </div>
        <div className="p-6 overflow-y-auto max-h-[70vh] text-[13px] font-mono text-gray-700 whitespace-pre-wrap bg-slate-50">
           {`// Auto-generated mock content for ${fileName}\n\n// We can imagine passing actual structured generation for files into this modal in the future.\n\nfunction init() {\n  console.log("Ready.");\n}`}
        </div>
      </div>
    </div>
  );
}

/* ── Root App ────────────────────────────────────────── */
function App() {
  const [status,      setStatus]      = useState('idle');
  const [brief,       setBrief]       = useState('');
  const [lines,       setLines]       = useState([]);
  const [proposal,    setProposal]    = useState('');
  const [mockOutputs, setMockOutputs] = useState(null);
  const [score,       setScore]       = useState(null);
  const [activeTab,   setActiveTab]   = useState('Proposal');
  const [visible,     setVisible]     = useState(false);
  const [fringeMode,  setFringeMode]  = useState(false);
  const [approvalSummary, setApprovalSummary] = useState(null);
  const [modalFile,   setModalFile]   = useState(null);

  const briefCycle = useRef(0);

  useEffect(() => { const t=setTimeout(()=>setVisible(true),80); return ()=>clearTimeout(t); }, []);

  const handlePrefill = useCallback(() => {
    const briefs = fringeMode ? EXAMPLE_BRIEFS_FRINGE : EXAMPLE_BRIEFS_STANDARD;
    setBrief(briefs[briefCycle.current % briefs.length]);
    briefCycle.current++;
  }, [fringeMode]);

  const handleRun = useCallback(async () => {
    if (!brief.trim() || status==='running') return;
    setStatus('running');
    setLines([]);
    setProposal('');
    setMockOutputs(null);
    setScore(null);
    setApprovalSummary(null);
    setActiveTab('Proposal');

    let propBuf = '';
    let done = false;

    try {
      const res = await fetch(`${API_BASE}/run-agent`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ brief }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let sseBuf    = '';

      while (true) {
        const { value, done: streamDone } = await reader.read();
        if (streamDone) break;

        sseBuf += decoder.decode(value, { stream: true });
        const blocks = sseBuf.split('\n\n');
        sseBuf = blocks.pop();

        for (const block of blocks) {
          const dataLine = block.split('\n').find(l => l.startsWith('data: '));
          if (!dataLine) continue;
          let evt;
          try { 
            evt = JSON.parse(dataLine.slice(6)); 
          } catch (e) { 
            console.error("Malformed SSE event:", dataLine);
            continue; 
          }

          try {
            if (evt.type === 'thinking') {
              const newLines = (evt.content || '').split('\n');
              setLines(prev => {
                const combined = [...prev, ...newLines].filter((l,i,a) =>
                  l.trim() || (i>0 && a[i-1].trim())
                );
                return combined.slice(-200); // keep last 200 lines max
              });
            } else if (evt.type === 'proposal') {
              propBuf += evt.content;
              setProposal(propBuf);
            } else if (evt.type === 'approval_required') {
              setApprovalSummary(evt.content);
            } else if (evt.type === 'complete') {
              const p = evt.content;
              if (!p) throw new Error("Complete event payload is empty");
              const openModal = (f) => setModalFile(f);
              setMockOutputs({ 
                 folders: p.folder_structure, 
                 calendar: p.calendar_blocks, 
                 email: p.email_preview,
                 contract_output: p.contract_output,
                 pricing_output: p.pricing_output,
                 meta: p.meta,
                 openModal
              });
              if (p.critique_output?.quality_score != null) setScore(p.critique_output.quality_score);
              if (p.final_proposal) setProposal(p.final_proposal);
              setStatus('complete');
              done = true;
              fireConfetti();
            } else if (evt.type === 'error') {
              throw new Error(evt.content?.message ?? JSON.stringify(evt.content));
            }
          } catch (errInner) {
            console.error("Error processing SSE event:", evt, errInner);
            setStatus('error');
            setLines(prev => [...prev, `❌ UI Process Error: ${errInner.message}`]);
          }
        }
      }

      if (!done) setStatus('complete');

    } catch (err) {
      setStatus('error');
      setLines(prev => [...prev, '', `❌ Error: ${err.message}`, '']);
    }
  }, [brief, status]);

  return (
    <div className="min-h-screen p-3 md:p-4 lg:p-5" style={{background:'#f8fafc'}}>

      <div className="flex items-center gap-3 mb-3 md:mb-4">
        <div className="h-px flex-1 bg-gray-200"/>
        <span className="text-[9px] font-mono text-gray-400 tracking-[.2em] uppercase whitespace-nowrap">
          CreativeOps AI · SME Force Multiplier · Arts &amp; Culture
        </span>
        <div className="h-px flex-1 bg-gray-200"/>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-[1fr_1.25fr_1.4fr] gap-3 md:gap-4" style={{height:'calc(100vh - 68px)'}}>

        <div className={`bg-white rounded-xl p-4 flex flex-col overflow-hidden overflow-y-auto min-h-[420px] md:min-h-0 transition-all border shadow-sm ${fringeMode ? 'border-purple-200' : 'border-gray-200'}`}>
          <BriefPanel
            brief={brief} setBrief={setBrief}
            onPrefill={handlePrefill} onRun={handleRun}
            status={status} visible={visible}
            fringeMode={fringeMode} setFringeMode={setFringeMode}
          />
        </div>

        <div className="bg-white border border-gray-200 shadow-sm rounded-xl p-4 flex flex-col overflow-hidden min-h-[380px] md:min-h-0">
          <ThinkingPanel lines={lines} status={status} visible={visible} fringeMode={fringeMode} />
        </div>

        <div className="bg-white border border-gray-200 shadow-sm rounded-xl p-4 flex flex-col overflow-hidden min-h-[480px] md:min-h-0 relative">
          {approvalSummary && (
            <div className="absolute top-0 left-0 right-0 z-10 m-2 bg-indigo-50 border border-indigo-200 rounded-lg p-3 shadow-md anim-up">
               <div className="flex justify-between items-start">
                  <div>
                    <h4 className="text-[13px] font-black text-indigo-700 font-mono mb-1">Human Approval Required</h4>
                    <p className="text-[11px] text-gray-600 font-bold">Critique Score: {approvalSummary.score}/10 &nbsp;|&nbsp; Margin: {approvalSummary.margin_health} &nbsp;|&nbsp; Risk: {approvalSummary.risk_score}/10</p>
                  </div>
               </div>
            </div>
          )}
          <div className={approvalSummary ? "pt-20 h-full flex flex-col" : "h-full flex flex-col"}>
             <OutputsPanel
               activeTab={activeTab} setActiveTab={setActiveTab}
               proposal={proposal} score={score}
               mockOutputs={mockOutputs} status={status} visible={visible}
             />
          </div>
        </div>
      </div>

      <div className="mt-2 text-center text-[9px] font-mono text-gray-400">
        CreativeOps AI · SME Force Multiplier + Arts &amp; Culture · Edinburgh Hackathon 2025
      </div>
      
      {modalFile && <FileModal fileName={modalFile} onClose={() => setModalFile(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
