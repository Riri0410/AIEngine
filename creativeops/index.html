<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreativeOps AI — Autonomous Creative Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ['"Space Mono"','monospace'], display: ['Syne','sans-serif'] } } }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: #0d1117; font-family: "Space Mono", monospace; color: #e2e8f0; }

    /* ── Scrollbar ── */
    .scroll-thin::-webkit-scrollbar { width: 4px; height: 4px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* ── Animations ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulseRing { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.2);opacity:0} }
    .cursor-blink { display:inline-block;width:7px;height:13px;background:#fbbf24;
                    animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px; }
    .line-in { animation: fadeUp .18s ease forwards; }
    .pulse-ring::after { content:'';position:absolute;inset:0;border-radius:50%;
                         background:currentColor;animation:pulseRing 1.6s ease-out infinite; }

    /* ── Agent badge ── */
    .badge {
      display:inline-flex;align-items:center;padding:1px 8px;border-radius:9999px;
      font-size:10px;font-weight:700;font-family:"Space Mono",monospace;
      letter-spacing:.04em;flex-shrink:0;white-space:nowrap;
    }
    .badge-maya  { background:#1a0f00;color:#f59e0b;border:1px solid #92400e40; }
    .badge-james { background:#00160a;color:#10b981;border:1px solid #06522840; }
    .badge-priya { background:#0f0f2a;color:#818cf8;border:1px solid #3730a340; }
    .badge-liam  { background:#1a0c00;color:#fb923c;border:1px solid #9a380040; }
    .badge-zara  { background:#1a0010;color:#f472b6;border:1px solid #9d174d40; }

    /* ── Inter-agent message ── */
    .agent-msg {
      display:flex;align-items:flex-start;gap:8px;
      background:#161b27;border-left:3px solid #4f6bff;
      padding:7px 10px;border-radius:4px;margin:3px 0;
      font-size:11px;line-height:1.5;
    }
    .agent-msg-text { color:#a8b4d8; flex:1; }

    /* ── Markdown ── */
    .md h1 { font-family:Syne,sans-serif;font-size:1.3rem;font-weight:800;color:#f0f0f0;margin:1rem 0 .4rem; }
    .md h2 { font-family:Syne,sans-serif;font-size:1rem;font-weight:700;color:#fbbf24;
             margin:1.1rem 0 .3rem;padding-bottom:4px;border-bottom:1px solid #21262d; }
    .md h3 { font-size:.9rem;font-weight:700;color:#a3e635;margin:.8rem 0 .25rem; }
    .md p  { color:#c4c4cc;font-size:.82rem;line-height:1.7;margin:.4rem 0; }
    .md ul,.md ol { color:#c4c4cc;font-size:.82rem;margin:.35rem 0 .35rem 1.2rem; }
    .md li { margin:.2rem 0; }
    .md table { width:100%;border-collapse:collapse;margin:.75rem 0;font-size:.77rem; }
    .md th { background:#161b22;color:#fbbf24;padding:6px 10px;text-align:left;
             border:1px solid #21262d;font-family:"Space Mono",monospace;font-size:.71rem; }
    .md td { color:#c4c4cc;padding:5px 10px;border:1px solid #21262d; }
    .md tr:nth-child(even) td { background:#0d1117; }
    .md strong { color:#f0f0f0; }
    .md code { background:#161b22;color:#a3e635;padding:1px 5px;border-radius:3px;font-size:.8em; }
    .md hr { border:none;border-top:1px solid #21262d;margin:1rem 0; }

    /* ── Fringe mode tint ── */
    body.fringe-mode { background: #0d0d1a; }
    body.fringe-mode .fringe-accent { border-color: #7c3aed !important; }

    /* ── Approval overlay ── */
    .approval-overlay {
      position:absolute;inset:0;background:rgba(13,17,23,.93);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      border-radius:8px;z-index:30;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;

const API_BASE = 'http://localhost:8000';

/* ── Agent config ── */
const AGENTS = {
  Maya:  { cls: 'badge-maya',  color: '#f59e0b', label: 'Research',  icon: '🔍' },
  James: { cls: 'badge-james', color: '#10b981', label: 'Proposal',  icon: '✍️' },
  Priya: { cls: 'badge-priya', color: '#818cf8', label: 'Critique',  icon: '🔄' },
  Liam:  { cls: 'badge-liam',  color: '#fb923c', label: 'Contract',  icon: '📋' },
  Zara:  { cls: 'badge-zara',  color: '#f472b6', label: 'Pricing',   icon: '💰' },
};

/* ── Example briefs ── */
const SME_BRIEFS = [
  `We are Tartan Audio, an Edinburgh-based independent music label specialising in folk and traditional Scottish music. We need a complete brand refresh and digital marketing campaign to launch our new streaming platform. Our current branding feels dated and doesn't reflect our artist roster or audience. Budget: £15,000. Timeline: 6 weeks.`,
  `We are Glennside Architecture, a boutique Glasgow architecture studio. Our website was built in 2019 and no longer reflects our portfolio quality. We need a full website redesign with a premium, minimal aesthetic, SEO uplift, and portfolio CMS. Budget: £9,500. Timeline: 5 weeks.`,
  `We are Thread & Thistle, a Glasgow-based sustainable fashion brand launching our first collection in September. We need brand identity design (logo, colours, typography), packaging design for 12 products, and a launch campaign strategy. Budget: £18,000.`,
];
const FRINGE_BRIEFS = [
  `We are Saltire & Verse, a spoken word poetry collective making our Edinburgh Fringe debut this August at Pleasance Courtyard. We have 4 shows, 60 seats per show, tickets at £12. We need a digital marketing campaign to sell out all performances and build a fanbase for future touring. Budget: £3,500.`,
  `We are The Glitch Ensemble, a dark comedy sketch group doing our second Fringe run at Assembly Roxy. Last year we sold 60% capacity — this year we want to sell out 6 shows of 80 seats. We need press strategy, social content, and paid social ads. Budget: £2,800.`,
  `We are Strange Latitude, a contemporary circus-theatre company premiering at the Fringe. 8 performances at Underbelly, 120-seat venue, tickets £15. We need photography, press releases to Edinburgh reviewers, and a TikTok content strategy. Budget: £4,200.`,
];

/* ── Badge component ── */
function Badge({ name }) {
  const a = AGENTS[name];
  if (!a) return null;
  return <span className={`badge ${a.cls}`}>{name}</span>;
}

/* ── Render one stream line ── */
const StreamLine = memo(function StreamLine({ item }) {
  /* Inter-agent message */
  if (item.type === 'agent_message') {
    const { from, to, message } = item;
    return (
      <div className="agent-msg line-in">
        <div style={{ display:'flex', alignItems:'center', gap:4, flexShrink:0 }}>
          <Badge name={from} />
          <span style={{ color:'#4f6bff', fontWeight:700, margin:'0 3px' }}>→</span>
          <Badge name={to} />
        </div>
        <div className="agent-msg-text">"{message}"</div>
      </div>
    );
  }

  const txt = item.text || '';
  /* Detect agent prefix [AgentName] */
  const agentMatch = txt.match(/^\[(\w+)\]\s*/);
  const agentName = agentMatch ? agentMatch[1] : null;
  const agent = agentName ? AGENTS[agentName] : null;
  const rest = agent ? txt.slice(agentMatch[0].length) : txt;

  /* Fallback colour by emoji/keyword */
  let color = '#8b949e';
  if (!agent) {
    if (/🔍|RESEARCH/.test(txt))  color = '#f59e0b';
    else if (/✍️|PROPOSAL/.test(txt)) color = '#10b981';
    else if (/🔄|CRITIQUE/.test(txt)) color = '#818cf8';
    else if (/📋|Liam|contract/i.test(txt)) color = '#fb923c';
    else if (/💰|Zara|pricing/i.test(txt)) color = '#f472b6';
    else if (/✅/.test(txt))       color = '#4ade80';
    else if (/🎉/.test(txt))       color = '#a78bfa';
    else if (/❌/.test(txt))       color = '#f87171';
  }

  return (
    <div className="line-in" style={{ display:'flex', alignItems:'flex-start', marginBottom:1, lineHeight:1.6 }}>
      {agent && <Badge name={agentName} />}
      <span style={{ color: agent ? agent.color : color, marginLeft: agent ? 6 : 0, flex:1 }}>
        {agent ? rest : txt}
      </span>
    </div>
  );
});

/* ── File modal ── */
function FileModal({ file, folder, onClose }) {
  const content = useMemo(() => {
    if (!file) return '';
    const name = file.toLowerCase();
    if (name.endsWith('.md'))   return `# ${file}\n\nThis document was auto-generated by CreativeOps AI as part of your project workspace.\n\n## Contents\n\nYour project team will populate this file during the engagement. Key sections will include:\n- Project overview and objectives\n- Key contacts and stakeholders\n- Approved deliverables and scope\n\n*Generated by CreativeOps AI — ${new Date().toLocaleDateString('en-GB')}*`;
    if (name.endsWith('.pdf'))  return `📄 **${file}**\n\nThis PDF will be generated and attached when the project kicks off.\n\n*Preview not available — file will be created during project delivery.*`;
    if (name.endsWith('.xlsx')) return `📊 **${file}**\n\nThis spreadsheet template is pre-configured for this project type.\n\n*Columns: Task | Owner | Due Date | Status | Notes*`;
    if (name.endsWith('.docx')) return `📝 **${file}**\n\nWord document template ready for your project.\n\n*Content will be populated by the project team.*`;
    if (name.endsWith('.pptx')) return `📊 **${file}**\n\nPresentation template with your brand colours applied.\n\n*Slides: Title | Agenda | Research | Concepts | Timeline | Budget | Next Steps*`;
    return `📁 **${file}**\n\nFile in \`${folder}/\`\n\n*This file will be created during project delivery.*`;
  }, [file, folder]);

  if (!file) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.75)', zIndex:50,
      display:'flex', alignItems:'center', justifyContent:'center', padding:24,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'#161b22', border:'1px solid #30363d', borderRadius:10,
        width:'100%', maxWidth:560, maxHeight:'80vh', overflow:'auto', padding:20,
      }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <span style={{ fontWeight:700, color:'#e2e8f0', fontSize:13 }}>📄 {file}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:18 }}>×</button>
        </div>
        <div className="md" dangerouslySetInnerHTML={{ __html: marked.parse(content) }} />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════════════ */
function App() {
  const [brief, setBrief]                 = useState('');
  const [isRunning, setIsRunning]         = useState(false);
  const [streamItems, setStreamItems]     = useState([]);
  const [proposalText, setProposalText]   = useState('');
  const [completeData, setCompleteData]   = useState(null);
  const [approvalData, setApprovalData]   = useState(null);
  const [approvalState, setApprovalState] = useState('pending'); // pending|approved|rejected
  const [activeTab, setActiveTab]         = useState('proposal');
  const [isFringe, setIsFringe]           = useState(false);
  const [briefIdx, setBriefIdx]           = useState(0);
  const [activeFile, setActiveFile]       = useState(null);
  const [activeFileFolder, setActiveFileFolder] = useState('');
  const termRef = useRef(null);

  /* Apply fringe class to body */
  useEffect(() => {
    document.body.classList.toggle('fringe-mode', isFringe);
  }, [isFringe]);

  /* Auto-scroll terminal */
  useEffect(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [streamItems]);

  const loadExample = useCallback(() => {
    const pool = isFringe ? FRINGE_BRIEFS : SME_BRIEFS;
    setBrief(pool[briefIdx % pool.length]);
    setBriefIdx(i => i + 1);
  }, [isFringe, briefIdx]);

  const runPipeline = useCallback(async () => {
    if (!brief.trim() || isRunning) return;
    setIsRunning(true);
    setStreamItems([]);
    setProposalText('');
    setCompleteData(null);
    setApprovalData(null);
    setApprovalState('pending');
    setActiveTab('proposal');

    try {
      const res = await fetch(`${API_BASE}/run-agent`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ brief: brief.trim(), is_fringe: isFringe }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop() || '';

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          try {
            const event = JSON.parse(line.slice(6));
            if (event.type === 'thinking') {
              setStreamItems(prev => [...prev, { type: 'thinking', text: event.content }]);
            } else if (event.type === 'agent_message') {
              setStreamItems(prev => [...prev, { type: 'agent_message', ...event.content }]);
            } else if (event.type === 'proposal') {
              setProposalText(prev => prev + event.content);
            } else if (event.type === 'approval_required') {
              setApprovalData(event.content);
              setStreamItems(prev => [...prev, { type: 'thinking', text: '\n⏸ Waiting for approval before sending...\n' }]);
            } else if (event.type === 'complete') {
              setCompleteData(event.content);
              setStreamItems(prev => [...prev, { type: 'thinking', text: '\n🎉 All 5 agents done. Your brief package is ready.\n' }]);
              if (window.confetti) confetti({
                particleCount: 120, spread: 70, origin: { y: 0.6 },
                colors: ['#f59e0b','#10b981','#818cf8','#fb923c','#f472b6'],
              });
            } else if (event.type === 'error') {
              setStreamItems(prev => [...prev, { type: 'thinking', text: `❌ ${event.content?.message}` }]);
            }
          } catch { /* ignore */ }
        }
      }
    } catch (err) {
      setStreamItems(prev => [...prev, { type: 'thinking', text: `❌ Connection error: ${err.message}` }]);
    } finally {
      setIsRunning(false);
    }
  }, [brief, isRunning, isFringe]);

  const handleKeyDown = useCallback(e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runPipeline();
  }, [runPipeline]);

  /* ── Derived data ── */
  const data          = completeData;
  const critique      = data?.critique_output  || {};
  const contractOut   = data?.contract_output  || {};
  const pricingOut    = data?.pricing_output   || {};
  const contractDoc   = data?.contract_doc     || {};

  const TABS = [
    { id: 'proposal',  label: '📄 Proposal'  },
    { id: 'contract',  label: '📋 Contract'  },
    { id: 'pricing',   label: '💰 Pricing'   },
    { id: 'folders',   label: '🗂️ Folders'  },
    { id: 'calendar',  label: '📅 Calendar'  },
    { id: 'email',     label: '✉️ Email'     },
  ];

  const fringeAccent = isFringe ? '#7c3aed' : '#4f6bff';

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>

      {/* ══════════ HEADER ══════════ */}
      <header style={{
        borderBottom: `1px solid ${isFringe ? '#3b0764' : '#21262d'}`,
        padding: '12px 24px', display:'flex', alignItems:'center',
        justifyContent:'space-between', background: isFringe ? '#0d0d1a' : '#0d1117',
        transition: 'all .3s',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{
            width:30, height:30, borderRadius:7,
            background: `linear-gradient(135deg, ${fringeAccent}, #06b6d4)`,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:14,
          }}>⚡</div>
          <div>
            <div style={{ fontFamily:'Syne,sans-serif', fontWeight:800, fontSize:'1rem', color:'#f0f0f0', letterSpacing:'-.01em' }}>
              CreativeOps AI
            </div>
            <div style={{ fontSize:9, color:'#4d5566' }}>
              5-agent autonomous creative back office
            </div>
          </div>
        </div>

        {/* ── SME / Fringe mode toggle ── */}
        <div style={{
          display:'flex', background:'#161b22', border:`1px solid ${isFringe ? '#3b0764' : '#21262d'}`,
          borderRadius:8, padding:3, gap:3, transition:'border-color .3s',
        }}>
          {[{ id:false, label:'🏢 Agency Mode' }, { id:true, label:'🎭 Fringe Mode' }].map(m => (
            <button key={String(m.id)} onClick={() => setIsFringe(m.id)} style={{
              padding:'5px 14px', borderRadius:6, fontSize:11, fontWeight:700,
              border:'none', cursor:'pointer', transition:'all .15s',
              background: isFringe === m.id ? (m.id ? '#2e1065' : '#1a1f35') : 'transparent',
              color: isFringe === m.id ? (m.id ? '#c084fc' : '#818cf8') : '#4d5566',
            }}>{m.label}</button>
          ))}
        </div>

        <div style={{ display:'flex', gap:6, alignItems:'center' }}>
          {Object.entries(AGENTS).map(([n, a]) => (
            <span key={n} className={`badge ${a.cls}`} style={{ fontSize:9 }}>{a.icon} {n}</span>
          ))}
        </div>
      </header>

      {/* ── Fringe banner ── */}
      {isFringe && (
        <div style={{
          background:'linear-gradient(90deg,#1e0a4e 0%,#0d0d1a 100%)',
          borderBottom:'1px solid #3b0764', padding:'7px 24px',
          display:'flex', alignItems:'center', gap:8, fontSize:11, color:'#c4b5fd',
        }}>
          <span>🎭</span>
          <strong>Fringe Mode</strong> — All 5 agents are tuned for Edinburgh arts acts.
          Maya uses festival economics data. James writes ticket-sales campaigns.
          Liam checks arts-specific contract risks. Zara benchmarks arts marketing rates.
        </div>
      )}

      {/* ── Approval summary banner ── */}
      {approvalData && (
        <div style={{
          background: isFringe ? '#1e0a4e' : '#161b22',
          borderBottom: `1px solid ${fringeAccent}44`,
          padding: '8px 24px', display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
        }}>
          <span style={{ fontSize:13 }}>⏸</span>
          <span style={{ fontSize:11, color:'#e2e8f0', flex:1 }}>{approvalData.message}</span>
          <div style={{ display:'flex', gap:6 }}>
            {['quality_score','contract_risk','pricing_verdict'].map(k => approvalData[k] && (
              <span key={k} style={{
                padding:'2px 8px', borderRadius:9999, fontSize:10, fontWeight:700,
                background:'#21262d', color:'#e2e8f0', fontFamily:'Space Mono,monospace',
              }}>{String(approvalData[k])}</span>
            ))}
          </div>
        </div>
      )}

      {/* ══════════ 3-COLUMN LAYOUT ══════════ */}
      <div style={{
        flex:1, display:'grid', gridTemplateColumns:'300px 1fr 1fr',
        gap:14, padding:'16px 20px',
      }}>

        {/* ────── COLUMN 1: Brief panel ────── */}
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>

          {/* Brief input */}
          <div style={{
            background:'#161b22', border:`1px solid ${isFringe ? '#3b0764' : '#21262d'}`,
            borderRadius:10, overflow:'hidden', transition:'border-color .3s',
          }}>
            <div style={{
              padding:'9px 14px', borderBottom:`1px solid #21262d`,
              display:'flex', justifyContent:'space-between', alignItems:'center',
            }}>
              <span style={{ fontSize:11, fontWeight:700, color:'#8b949e' }}>CLIENT BRIEF</span>
              <button onClick={loadExample} style={{
                fontSize:10, color: fringeAccent, background:'none', border:'none',
                cursor:'pointer', fontFamily:'Space Mono,monospace',
              }}>⚡ {isFringe ? 'Fringe' : 'Example'} brief</button>
            </div>
            <textarea value={brief} onChange={e => setBrief(e.target.value)} onKeyDown={handleKeyDown}
              placeholder={isFringe
                ? "Describe your Fringe act, venue, show dates, ticket price, and marketing goals..."
                : "Describe your client's business, what they need, budget, and timeline..."
              }
              style={{
                width:'100%', minHeight:160, padding:'10px 14px',
                background:'transparent', border:'none', outline:'none',
                color:'#e2e8f0', fontSize:12, lineHeight:1.65, resize:'vertical',
                fontFamily:'Space Mono,monospace',
              }}
            />
          </div>

          {/* Run button */}
          <button onClick={runPipeline} disabled={isRunning || !brief.trim()} style={{
            padding:'11px 16px', borderRadius:8, fontWeight:700, fontSize:12,
            border:'none', cursor: isRunning || !brief.trim() ? 'not-allowed' : 'pointer',
            background: isRunning ? '#21262d' : `linear-gradient(135deg, ${fringeAccent}, #06b6d4)`,
            color: isRunning ? '#4d5566' : '#fff', transition:'all .2s',
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            fontFamily:'Space Mono,monospace',
          }}>
            {isRunning ? (
              <><span className="cursor-blink" style={{background:'#4d5566'}} />5 Agents Running…</>
            ) : (
              <>⚡ Run Agent Pipeline <span style={{fontSize:9,opacity:.6}}>⌘↵</span></>
            )}
          </button>

          {/* Past clients / memory */}
          <div style={{ background:'#161b22', border:'1px solid #21262d', borderRadius:10, padding:'12px 14px' }}>
            <div style={{ fontSize:10, fontWeight:700, color:'#4d5566', marginBottom:8, letterSpacing:'.06em' }}>
              🧠 AGENCY MEMORY (RAG)
            </div>
            {[
              { name:'Wavefront Records', type:'Music Brand Campaign', budget:'£12k', year:2023, result:'42k impressions' },
              { name:'Glasswork Studio',  type:'Architecture Web',     budget:'£8k',  year:2023, result:'+68% traffic' },
              { name:'Fringe Forward',    type:'Arts Digital Marketing',budget:'£20k', year:2024, result:'91% sell-through' },
            ].map(c => (
              <div key={c.name} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'5px 0', borderBottom:'1px solid #21262d' }}>
                <div>
                  <div style={{ fontSize:11, color:'#e2e8f0', fontWeight:600 }}>{c.name}</div>
                  <div style={{ fontSize:9, color:'#4d5566' }}>{c.type} · {c.budget}</div>
                </div>
                <div style={{
                  fontSize:9, padding:'2px 6px', borderRadius:9999,
                  background:'#0a2218', color:'#4ade80', border:'1px solid #16653440',
                  fontFamily:'Space Mono,monospace',
                }}>RAG ✓</div>
              </div>
            ))}
          </div>

          {/* Agent legend */}
          <div style={{ background:'#161b22', border:'1px solid #21262d', borderRadius:10, padding:'12px 14px' }}>
            <div style={{ fontSize:10, fontWeight:700, color:'#4d5566', marginBottom:8, letterSpacing:'.06em' }}>AGENT PIPELINE</div>
            {Object.entries(AGENTS).map(([n, a], i) => (
              <div key={n} style={{ display:'flex', alignItems:'center', gap:8, padding:'3px 0' }}>
                <span style={{ fontSize:9, color:'#30363d', fontFamily:'Space Mono,monospace', width:14 }}>{i+1}.</span>
                <Badge name={n} />
                <span style={{ fontSize:10, color:'#4d5566' }}>{a.label}</span>
              </div>
            ))}
            <div style={{ marginTop:8, padding:'6px 8px', background:'#0d1117', borderRadius:5, fontSize:9, color:'#30363d', lineHeight:1.6 }}>
              Agents pass notes to each other live → watch the terminal
            </div>
          </div>
        </div>

        {/* ────── COLUMN 2: Agent stream terminal ────── */}
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {/* Terminal */}
          <div style={{
            background:'#161b22', border:'1px solid #21262d', borderRadius:10,
            overflow:'hidden', display:'flex', flexDirection:'column', flex:1,
          }}>
            {/* Terminal title bar */}
            <div style={{
              padding:'8px 14px', borderBottom:'1px solid #21262d',
              display:'flex', alignItems:'center', gap:6, background:'#0d1117',
            }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background:'#ff5f57' }} />
              <div style={{ width:10, height:10, borderRadius:'50%', background:'#febc2e' }} />
              <div style={{ width:10, height:10, borderRadius:'50%', background:'#28c840' }} />
              <span style={{ marginLeft:8, fontSize:10, color:'#4d5566' }}>
                creativeops — agent stream {isRunning && '●'}
              </span>
              {isRunning && (
                <span style={{ marginLeft:'auto', fontSize:9, color: fringeAccent, fontWeight:700 }}>
                  LIVE
                </span>
              )}
            </div>

            {/* Stream content */}
            <div ref={termRef} className="scroll-thin" style={{
              flex:1, padding:'12px 14px', overflowY:'auto', fontSize:11, lineHeight:1.65,
              minHeight:480, maxHeight:520, background:'#0d1117',
            }}>
              {streamItems.length === 0 ? (
                <div style={{ color:'#21262d', lineHeight:1.8 }}>
                  <div>$ creativeops --agents=5 --stream=live</div>
                  <div style={{ marginTop:4 }}>Waiting for brief...<span className="cursor-blink" /></div>
                  <div style={{ marginTop:16, color:'#1a2030', lineHeight:2 }}>
                    {Object.entries(AGENTS).map(([n,a]) => (
                      <div key={n}>├─ <span style={{color:a.color}}>{n.padEnd(6)}</span> · {a.label}</div>
                    ))}
                  </div>
                </div>
              ) : (
                streamItems.map((item, i) => <StreamLine key={i} item={item} />)
              )}
              {isRunning && <span className="cursor-blink" />}
            </div>
          </div>
        </div>

        {/* ────── COLUMN 3: Tabbed output panel ────── */}
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>

          {/* Tab buttons */}
          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                padding:'6px 12px', borderRadius:6, fontSize:11, fontWeight:700,
                border: `1px solid ${activeTab===t.id ? fringeAccent+'66' : '#21262d'}`,
                background: activeTab===t.id ? '#161b22' : 'transparent',
                color: activeTab===t.id ? '#e2e8f0' : '#4d5566',
                cursor:'pointer', transition:'all .15s',
                fontFamily:'Space Mono,monospace',
              }}>{t.label}</button>
            ))}
          </div>

          {/* Panel */}
          <div className="scroll-thin" style={{
            background:'#161b22', border:'1px solid #21262d', borderRadius:10,
            padding:16, overflow:'auto', flex:1, maxHeight:560, position:'relative',
          }}>

            {/* ── PROPOSAL TAB ── */}
            {activeTab === 'proposal' && (
              <div>
                {critique.quality_score && (
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:12 }}>
                    <span style={{
                      padding:'3px 10px', borderRadius:9999, fontSize:11, fontWeight:700,
                      background: critique.quality_score>=8 ? '#0a2218' : critique.quality_score>=6 ? '#1a0f00' : '#200a0a',
                      color: critique.quality_score>=8 ? '#4ade80' : critique.quality_score>=6 ? '#fbbf24' : '#f87171',
                      border:'1px solid currentColor20',
                    }}>Score: {critique.quality_score}/10</span>
                    <span style={{
                      padding:'3px 10px', borderRadius:9999, fontSize:11, fontWeight:700,
                      background:'#0f1629', color:'#818cf8', border:'1px solid #30376840',
                    }}>{critique.final_recommendation || 'Reviewing…'}</span>
                    {critique.strengths?.slice(0,1).map((s,i) => (
                      <span key={i} style={{ padding:'3px 8px', borderRadius:9999, fontSize:10, background:'#0a2218', color:'#4ade80', border:'1px solid #16653440' }}>
                        ✓ {s}
                      </span>
                    ))}
                  </div>
                )}
                {proposalText
                  ? <div className="md" dangerouslySetInnerHTML={{ __html: marked.parse(proposalText) }} />
                  : <EmptyState icon="📄" text="Proposal will appear here as James writes it…" />
                }
              </div>
            )}

            {/* ── CONTRACT TAB ── */}
            {activeTab === 'contract' && (
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                  <Badge name="Liam" />
                  <span style={{ fontSize:13, fontWeight:700, color:'#fb923c' }}>Contract Analysis & SOW</span>
                  {contractOut.risk_level && (
                    <span style={{
                      padding:'2px 8px', borderRadius:9999, fontSize:10, fontWeight:700,
                      background: contractOut.risk_level==='high' ? '#200a0a' : contractOut.risk_level==='medium' ? '#1a0f00' : '#0a2218',
                      color: contractOut.risk_level==='high' ? '#f87171' : contractOut.risk_level==='medium' ? '#fbbf24' : '#4ade80',
                    }}>{contractOut.risk_level?.toUpperCase()} RISK</span>
                  )}
                </div>

                {contractOut.risk_level ? (
                  <>
                    {/* Contract terms */}
                    {contractOut.contract_terms && (
                      <div style={{ background:'#0d1117', border:'1px solid #21262d', borderRadius:6, padding:12, marginBottom:12 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#4d5566', marginBottom:8, letterSpacing:'.06em' }}>CONTRACT TERMS</div>
                        {Object.entries(contractOut.contract_terms).map(([k,v]) => v && (
                          <div key={k} style={{ display:'flex', gap:8, padding:'3px 0', borderBottom:'1px solid #21262d22', fontSize:11 }}>
                            <span style={{ color:'#4d5566', minWidth:160 }}>{k.replace(/_/g,' ')}</span>
                            <span style={{ color:'#e2e8f0' }}>{v}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* Scope risks */}
                    {contractOut.scope_risks?.length > 0 && (
                      <div style={{ marginBottom:10 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#f87171', marginBottom:6, letterSpacing:'.06em' }}>⚠ SCOPE RISKS</div>
                        {contractOut.scope_risks.map((r,i) => (
                          <div key={i} style={{ fontSize:11, color:'#fca5a5', padding:'2px 0' }}>• {r}</div>
                        ))}
                      </div>
                    )}
                    {/* Recommended additions */}
                    {contractOut.recommended_additions?.length > 0 && (
                      <div style={{ marginBottom:10 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#4ade80', marginBottom:6, letterSpacing:'.06em' }}>RECOMMENDED ADDITIONS</div>
                        {contractOut.recommended_additions.map((a,i) => (
                          <div key={i} style={{ fontSize:11, color:'#86efac', padding:'2px 0' }}>→ {a}</div>
                        ))}
                      </div>
                    )}
                    {/* Full SOW */}
                    {contractDoc.sow_text && (
                      <div style={{ marginTop:14, borderTop:'1px solid #21262d', paddingTop:14 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#4d5566', marginBottom:10, letterSpacing:'.06em' }}>FULL STATEMENT OF WORK</div>
                        <div className="md" dangerouslySetInnerHTML={{ __html: marked.parse(contractDoc.sow_text) }} />
                      </div>
                    )}
                  </>
                ) : (
                  <EmptyState icon="📋" text="Liam's contract analysis will appear here…" />
                )}
              </div>
            )}

            {/* ── PRICING TAB ── */}
            {activeTab === 'pricing' && (
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                  <Badge name="Zara" />
                  <span style={{ fontSize:13, fontWeight:700, color:'#f472b6' }}>Pricing Intelligence</span>
                  {pricingOut.pricing_verdict && (
                    <span style={{
                      padding:'2px 8px', borderRadius:9999, fontSize:10, fontWeight:700,
                      background: pricingOut.pricing_verdict==='underpriced' ? '#200a0a' : pricingOut.pricing_verdict==='premium' ? '#1a0f00' : '#0a2218',
                      color: pricingOut.pricing_verdict==='underpriced' ? '#f87171' : pricingOut.pricing_verdict==='premium' ? '#fbbf24' : '#4ade80',
                    }}>{pricingOut.pricing_verdict?.toUpperCase()}</span>
                  )}
                </div>

                {pricingOut.pricing_verdict ? (
                  <>
                    {/* Budget health */}
                    {pricingOut.budget_health && Object.keys(pricingOut.budget_health).length > 0 && (
                      <div style={{ background:'#0d1117', border:'1px solid #21262d', borderRadius:6, padding:12, marginBottom:12 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#4d5566', marginBottom:8, letterSpacing:'.06em' }}>BUDGET POSITION</div>
                        {Object.entries(pricingOut.budget_health).map(([k,v]) => v && (
                          <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:11, padding:'2px 0' }}>
                            <span style={{ color:'#4d5566' }}>{k.replace(/_/g,' ')}</span>
                            <span style={{ color:'#e2e8f0', fontFamily:'Space Mono,monospace' }}>
                              {typeof v === 'number' ? `£${v.toLocaleString()}` : v}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Underpriced items */}
                    {pricingOut.underpriced_items?.length > 0 && (
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#f87171', marginBottom:6, letterSpacing:'.06em' }}>⚠ UNDERPRICED ITEMS</div>
                        {pricingOut.underpriced_items.map((item,i) => (
                          <div key={i} style={{ background:'#200a0a', border:'1px solid #450a0a', borderRadius:5, padding:'6px 10px', marginBottom:6, fontSize:11 }}>
                            <div style={{ color:'#fca5a5', fontWeight:700 }}>{item.item}</div>
                            <div style={{ color:'#4d5566', marginTop:2 }}>
                              Our charge: {item.our_charge === 0 ? 'FREE' : `£${item.our_charge}`} · Market: {item.market_rate}
                            </div>
                            {item.note && <div style={{ color:'#94a3b8', marginTop:2, fontSize:10 }}>{item.note}</div>}
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Upsell opportunities */}
                    {pricingOut.upsell_opportunities?.length > 0 && (
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#4ade80', marginBottom:6, letterSpacing:'.06em' }}>🚀 UPSELL OPPORTUNITIES</div>
                        {pricingOut.upsell_opportunities.map((opp,i) => (
                          <div key={i} style={{ background:'#0a2218', border:'1px solid #16653440', borderRadius:5, padding:'6px 10px', marginBottom:6, fontSize:11 }}>
                            <div style={{ color:'#86efac', fontWeight:700 }}>{opp.service}</div>
                            <div style={{ color:'#4ade80', fontFamily:'Space Mono,monospace', fontSize:10 }}>{opp.value}</div>
                            <div style={{ color:'#4d5566', marginTop:2, fontSize:10 }}>Timing: {opp.timing}</div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Negotiation note */}
                    {pricingOut.negotiation_note && (
                      <div style={{ background:'#161b22', border:'1px solid #21262d', borderRadius:6, padding:10, fontSize:11, color:'#e2e8f0' }}>
                        <div style={{ fontSize:9, fontWeight:700, color:'#f472b6', marginBottom:4 }}>NEGOTIATION NOTE</div>
                        {pricingOut.negotiation_note}
                      </div>
                    )}
                    {pricingOut.walk_away_point && (
                      <div style={{ marginTop:8, padding:'6px 10px', background:'#1a0505', border:'1px solid #450a0a', borderRadius:6, fontSize:11, color:'#fca5a5' }}>
                        Walk-away: {pricingOut.walk_away_point}
                      </div>
                    )}
                  </>
                ) : (
                  <EmptyState icon="💰" text="Zara's pricing analysis will appear here…" />
                )}
              </div>
            )}

            {/* ── FOLDERS TAB ── */}
            {activeTab === 'folders' && (
              <div>
                <div style={{ fontSize:11, fontWeight:700, color:'#8b949e', marginBottom:10 }}>🗂️ Project Workspace</div>
                {data?.folder_structure ? (
                  <>
                    <div style={{ fontSize:10, color:'#4d5566', marginBottom:10, fontFamily:'Space Mono,monospace' }}>
                      /{data.folder_structure.root}
                    </div>
                    {data.folder_structure.folders.map(folder => (
                      <div key={folder} style={{ marginBottom:10 }}>
                        <div style={{
                          display:'flex', alignItems:'center', gap:6, padding:'4px 8px',
                          background:'#0d1117', borderRadius:5, marginBottom:4,
                        }}>
                          <span style={{ fontSize:11 }}>📁</span>
                          <span style={{ fontSize:11, fontWeight:700, color:'#e2e8f0' }}>{folder}/</span>
                        </div>
                        <div style={{ paddingLeft:20 }}>
                          {(data.folder_structure.files[folder] || []).map(file => (
                            <button key={file} onClick={() => { setActiveFile(file); setActiveFileFolder(folder); }}
                              style={{
                                display:'flex', alignItems:'center', gap:6, padding:'3px 6px',
                                width:'100%', textAlign:'left', background:'none', border:'none',
                                cursor:'pointer', borderRadius:4, marginBottom:2,
                                transition:'background .1s',
                              }}
                              onMouseEnter={e => e.currentTarget.style.background='#21262d'}
                              onMouseLeave={e => e.currentTarget.style.background='none'}
                            >
                              <span style={{ fontSize:10 }}>
                                {file.endsWith('/') ? '📂' : file.endsWith('.pdf') ? '📄' : file.endsWith('.md') ? '📝' : file.endsWith('.xlsx') ? '📊' : file.endsWith('.pptx') ? '📊' : file.endsWith('.docx') ? '📝' : file.endsWith('.zip') ? '📦' : '📄'}
                              </span>
                              <span style={{ fontSize:11, color:'#8b949e' }}>{file}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </>
                ) : (
                  <EmptyState icon="🗂️" text="Project folder structure will appear here…" />
                )}
              </div>
            )}

            {/* ── CALENDAR TAB ── */}
            {activeTab === 'calendar' && (
              <div>
                <div style={{ fontSize:11, fontWeight:700, color:'#8b949e', marginBottom:10 }}>📅 Project Calendar</div>
                {data?.calendar_blocks?.length > 0 ? (() => {
                  const byWeek = {};
                  data.calendar_blocks.forEach(e => { if (!byWeek[e.week_number]) byWeek[e.week_number]=[]; byWeek[e.week_number].push(e); });
                  return Object.entries(byWeek).map(([w, evs]) => (
                    <div key={w} style={{ marginBottom:14 }}>
                      <div style={{ fontSize:9, fontWeight:700, color:'#4d5566', marginBottom:6, letterSpacing:'.06em' }}>WEEK {w}</div>
                      {evs.map((e,i) => (
                        <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'6px 0', borderBottom:'1px solid #21262d22' }}>
                          <span style={{ fontSize:16, width:22, flexShrink:0 }}>{e.icon}</span>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:12, fontWeight:600, color:'#e2e8f0' }}>{e.title}</div>
                            <div style={{ fontSize:9, color:'#4d5566', fontFamily:'Space Mono,monospace', marginTop:1 }}>
                              {e.date} · {e.time} · {e.duration_minutes}min
                            </div>
                          </div>
                          <span style={{ fontSize:9, padding:'2px 5px', background:'#21262d', color:'#8b949e', borderRadius:3 }}>{e.type}</span>
                        </div>
                      ))}
                    </div>
                  ));
                })() : <EmptyState icon="📅" text="Calendar will appear after pipeline completes…" />}
              </div>
            )}

            {/* ── EMAIL TAB ── */}
            {activeTab === 'email' && (
              <div style={{ position:'relative' }}>
                <div style={{ fontSize:11, fontWeight:700, color:'#8b949e', marginBottom:10 }}>✉️ Client Email Draft</div>

                {/* Human approval gate */}
                {data?.email_preview && approvalState === 'pending' && (
                  <div className="approval-overlay">
                    <div style={{ fontSize:32, marginBottom:12 }}>📬</div>
                    <div style={{ fontFamily:'Syne,sans-serif', fontSize:18, fontWeight:800, color:'#f0f0f0', marginBottom:6 }}>
                      Ready to send?
                    </div>
                    <div style={{ fontSize:11, color:'#4d5566', marginBottom:8, textAlign:'center', maxWidth:280, lineHeight:1.6 }}>
                      All 5 agents have reviewed this proposal.<br />
                      Approve to send to the client.
                    </div>
                    {approvalData && (
                      <div style={{ display:'flex', gap:6, marginBottom:16, flexWrap:'wrap', justifyContent:'center' }}>
                        {[
                          { label: `Quality: ${approvalData.quality_score}/10` },
                          { label: `Contract: ${approvalData.contract_risk}` },
                          { label: `Pricing: ${approvalData.pricing_verdict}` },
                        ].map(b => (
                          <span key={b.label} style={{ padding:'2px 8px', borderRadius:9999, fontSize:9, background:'#21262d', color:'#8b949e' }}>
                            {b.label}
                          </span>
                        ))}
                      </div>
                    )}
                    <div style={{ display:'flex', gap:8 }}>
                      <button onClick={() => setApprovalState('approved')} style={{
                        padding:'9px 22px', borderRadius:7, fontWeight:700, fontSize:12,
                        background:'linear-gradient(135deg,#059669,#10b981)', color:'#fff',
                        border:'none', cursor:'pointer', fontFamily:'Space Mono,monospace',
                      }}>✅ Approve & Send</button>
                      <button onClick={() => setApprovalState('rejected')} style={{
                        padding:'9px 22px', borderRadius:7, fontWeight:700, fontSize:12,
                        background:'#161b22', color:'#f87171', border:'1px solid #450a0a',
                        cursor:'pointer', fontFamily:'Space Mono,monospace',
                      }}>✏️ Request Changes</button>
                    </div>
                  </div>
                )}

                {data?.email_preview ? (
                  <div style={{ opacity: approvalState==='pending' ? .15 : 1 }}>
                    {approvalState === 'approved' && (
                      <div style={{ background:'#0a2218', border:'1px solid #16653440', borderRadius:6, padding:'6px 12px', marginBottom:10, fontSize:11, color:'#4ade80', display:'flex', alignItems:'center', gap:6 }}>
                        ✅ Sent to {data.email_preview.to}
                      </div>
                    )}
                    {approvalState === 'rejected' && (
                      <div style={{ background:'#200a0a', border:'1px solid #450a0a', borderRadius:6, padding:'6px 12px', marginBottom:10, fontSize:11, color:'#f87171', display:'flex', alignItems:'center', gap:6 }}>
                        ✏️ Changes requested — proposal returned to team
                      </div>
                    )}
                    <div style={{ background:'#0d1117', border:'1px solid #21262d', borderRadius:6, padding:10, marginBottom:10 }}>
                      {[['To', data.email_preview.to], ['Subject', data.email_preview.subject], ['Status', data.email_preview.status]].map(([k,v]) => (
                        <div key={k} style={{ display:'flex', gap:10, fontSize:11, padding:'2px 0' }}>
                          <span style={{ color:'#4d5566', width:52, flexShrink:0 }}>{k}:</span>
                          <span style={{ color:'#e2e8f0' }}>{v}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize:11, color:'#c4c4cc', lineHeight:1.8, whiteSpace:'pre-wrap', background:'#0d1117', border:'1px solid #21262d', borderRadius:6, padding:12 }}>
                      {data.email_preview.body}
                    </div>
                    {data.email_preview.attachments?.length > 0 && (
                      <div style={{ marginTop:8, display:'flex', gap:6, flexWrap:'wrap' }}>
                        {data.email_preview.attachments.map(a => (
                          <span key={a} style={{ fontSize:10, padding:'2px 8px', background:'#161b22', border:'1px solid #21262d', borderRadius:4, color:'#8b949e' }}>📎 {a}</span>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <EmptyState icon="✉️" text="Email draft will appear after pipeline completes…" />
                )}
              </div>
            )}

          </div>{/* end panel */}
        </div>{/* end col 3 */}
      </div>{/* end grid */}

      {/* ── File modal ── */}
      <FileModal file={activeFile} folder={activeFileFolder} onClose={() => setActiveFile(null)} />

    </div>
  );
}

function EmptyState({ icon, text }) {
  return (
    <div style={{ textAlign:'center', padding:'50px 20px', color:'#21262d' }}>
      <div style={{ fontSize:36, marginBottom:10 }}>{icon}</div>
      <div style={{ fontSize:12 }}>{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
